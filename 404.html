<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>OKE Canada quote</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: #0b0d10;
    color: #e9ecef;
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  main { max-width: 560px; padding: 32px; text-align: center; }
  a { color: #ff6a00; }
</style>
</head>
<body>
<main>
  <h1>Opening quote...</h1>
  <p id="msg">If nothing happens, use the link below.</p>
  <p><a id="fallback" href="./quote.html">Open quote page</a></p>
</main>
<script>
  const path = window.location.pathname;
  const match = path.match(/\/q\/([^/?#]+)/);
  if (match) {
    const token = decodeURIComponent(match[1]);
    const base = path.replace(/\/q\/[^/?#]+$/, '/quote.html');
    const url = `${window.location.origin}${base}?token=${encodeURIComponent(token)}`;
    document.getElementById('fallback').href = url;
    window.location.replace(url);
  } else {
    const home = path.includes('/montedesign/') ? '/montedesign/' : './';
    document.getElementById('msg').textContent = 'That page was not found.';
    document.getElementById('fallback').textContent = 'Back to calculator';
    document.getElementById('fallback').href = home;
  }
</script>
</body>
</html>
